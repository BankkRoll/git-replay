name: publish

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: Run through publish without actually publishing
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    if: github.repository == 'BankkRoll/git-replay'
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - name: Publish (dry run)
        if: ${{ inputs.dry-run }}
        run: npm publish --access public --provenance --dry-run
      - name: Publish
        if: ${{ !inputs.dry-run }}
        run: npm publish --access public --provenance
